<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Download — Conor + Claude</title>
<style>
  :root{--ink:#0f0f0f;--paper:#faf8f4;--accent:#0b6b5e;--muted:#5c5c5c;--line:#e3ded5;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.5;}
  .card{width:100%;max-width:480px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:40px 36px;box-shadow:0 12px 40px rgba(0,0,0,.06);}
  .kicker{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;}
  h1{font-size:30px;line-height:1.18;font-weight:800;letter-spacing:-0.01em;margin-bottom:14px;}
  .sub{font-size:17px;color:var(--muted);margin-bottom:28px;}
  form{display:flex;flex-direction:column;gap:12px}
  input{width:100%;padding:15px 16px;font-size:16px;border:1px solid var(--line);border-radius:10px;outline:none;}
  input:focus{border-color:var(--accent)}
  button{width:100%;padding:15px 16px;font-size:16px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:10px;cursor:pointer;}
  .fine{margin-top:16px;font-size:13px;color:#9a9a9a;text-align:center;}
</style>
</head>
<body>
  <div class="card">
    <div class="kicker">FREE DOWNLOAD</div>
    <h1 id="headline">The Test Checklist</h1>
    <p class="sub" id="subhead">Drop your name and email and I'll send it straight to your inbox.</p>
    <form id="optin">
      <input type="text" id="name" placeholder="Your first name" required autocomplete="given-name">
      <input type="email" id="email" placeholder="Your best email" required autocomplete="email">
      <button type="submit">Send it to me &rarr;</button>
    </form>
    <div class="fine">No spam. Unsubscribe anytime.</div>
  </div>
<script>
  var THANK_YOU_URL = "https://wwc-oto.netlify.app/";
  var WORKER = "https://optin-subscribe.conorboyland.workers.dev";
  // Groups this page adds people to: Newsletter + this magnet's group
  var GROUPS = ["189561300354860354","189574183085147431"];
  document.getElementById('optin').addEventListener('submit', function(e){
    e.preventDefault();
    var payload = {
      email: document.getElementById('email').value,
      name: document.getElementById('name').value,
      groups: GROUPS
    };
    try {
      fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),keepalive:true});
    } catch(e){}
    window.location.href = THANK_YOU_URL;
  });
</script>
</body>
</html>
